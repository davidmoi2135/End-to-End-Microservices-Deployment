apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: spring-microservices
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/your-username/your-repo.git # Thay bằng URL repo của bạn
    targetRevision: HEAD
    path: spring-boot-app/k8s
  destination:
    server: https://kubernetes.default.svc
    namespace: spring-microservices
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
