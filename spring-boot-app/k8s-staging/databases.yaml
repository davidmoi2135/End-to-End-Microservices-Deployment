apiVersion: v1
kind: Service
metadata:
  name: mongo
  namespace: spring-microservices-staging
spec:
  ports:
    - port: 27017
  selector:
    app: mongo
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongo
  namespace: spring-microservices-staging
spec:
  selector:
    matchLabels:
      app: mongo
  template:
    metadata:
      labels:
        app: mongo
    spec:
      containers:
        - name: mongo
          image: mongo:4.4.14
          ports:
            - containerPort: 27017
---
apiVersion: v1
kind: Service
metadata:
  name: postgres-order
  namespace: spring-microservices-staging
spec:
  ports:
    - port: 5431
      targetPort: 5431
  selector:
    app: postgres-order
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres-order
  namespace: spring-microservices-staging
spec:
  selector:
    matchLabels:
      app: postgres-order
  template:
    metadata:
      labels:
        app: postgres-order
    spec:
      containers:
        - name: postgres-order
          image: postgres
          env:
            - name: POSTGRES_DB
              value: order-service
            - name: POSTGRES_USER
              value: ptechie
            - name: POSTGRES_PASSWORD
              value: password
            - name: PGPORT
              value: "5431"
          ports:
            - containerPort: 5431
---
apiVersion: v1
kind: Service
metadata:
  name: postgres-inventory
  namespace: spring-microservices-staging
spec:
  ports:
    - port: 5432
  selector:
    app: postgres-inventory
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres-inventory
  namespace: spring-microservices-staging
spec:
  selector:
    matchLabels:
      app: postgres-inventory
  template:
    metadata:
      labels:
        app: postgres-inventory
    spec:
      containers:
        - name: postgres-inventory
          image: postgres
          env:
            - name: POSTGRES_DB
              value: inventory-service
            - name: POSTGRES_USER
              value: ptechie
            - name: POSTGRES_PASSWORD
              value: password
          ports:
            - containerPort: 5432
---
apiVersion: v1
kind: Service
metadata:
  name: keycloak-mysql
  namespace: spring-microservices-staging
spec:
  ports:
    - port: 3306
  selector:
    app: keycloak-mysql
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: keycloak-mysql
  namespace: spring-microservices-staging
spec:
  selector:
    matchLabels:
      app: keycloak-mysql
  template:
    metadata:
      labels:
        app: keycloak-mysql
    spec:
      containers:
        - name: keycloak-mysql
          image: mysql:5.7
          env:
            - name: MYSQL_ROOT_PASSWORD
              value: root
            - name: MYSQL_DATABASE
              value: keycloak
            - name: MYSQL_USER
              value: keycloak
            - name: MYSQL_PASSWORD
              value: password
          ports:
            - containerPort: 3306
