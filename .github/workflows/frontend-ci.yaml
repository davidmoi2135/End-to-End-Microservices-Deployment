name: Frontend CI

on:
  push:
    branches: [ "main" ]
    paths:
      - 'spring-boot-app/frontend/**'

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: spring-boot-app/frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      # Cache node_modules (build nhanh hơn)
      - name: Cache node modules
        uses: actions/cache@v3
        with:
          path: spring-boot-app/frontend/node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('spring-boot-app/frontend/package-lock.json') }}

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install

      - name: Build React app
        run: npm run build

      # Login Docker Hub
      - name: Login Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Build & Push Docker image
      - name: Build & Push Docker image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/frontend:${{ github.sha }} ./spring-boot-app/frontend  
          docker push ${{ secrets.DOCKER_USERNAME }}/frontend:${{ github.sha }}