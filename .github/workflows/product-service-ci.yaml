name: Product Service CI

on:
  push:
    branches: [ "main" ]
    paths:
      - 'spring-boot-app/product-service/**'

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: spring-boot-app/product-service

    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build and analyze with SonarQube
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        run: mvn clean verify org.sonarsource.scanner.maven:sonar-maven-plugin:sonar -Dsonar.projectKey=spring-boot-app-product-service -DskipTests

      - name: Login Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/product-service:${{ github.sha }} . 

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ secrets.DOCKER_USERNAME }}/product-service:${{ github.sha }}'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

      - name: Push Docker image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/product-service:${{ github.sha }}

      # Bước GitOps: Cập nhật manifest để ArgoCD nhận diện
      - name: Update Kubernetes Manifest
        run: |
          sed -i "s|image: .*|image: ${{ secrets.DOCKER_USERNAME }}/product-service:${{ github.sha }}|g" ../k8s/canary-rollouts.yaml
          git config --global user.email "ci-bot@example.com"
          git config --global user.name "CI Bot"
          git add ../k8s/canary-rollouts.yaml
          git commit -m "chore: update product-service image to ${{ github.sha }} [skip ci]"
          git push

      - name: Send Slack Notification (Success)
        if: success()
        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_COLOR: 'good'
          SLACK_TITLE: 'Build & Canary Deployment Triggered'
          SLACK_MESSAGE: 'Service: product-service has been updated to ${{ github.sha }}. ArgoCD is now performing Canary deployment! 🚀'

      - name: Send Slack Notification (Failure)
        if: failure()
        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_COLOR: 'danger'
          SLACK_TITLE: 'Build Failed'
          SLACK_MESSAGE: 'Something went wrong in the CI pipeline for product-service. ❌'
